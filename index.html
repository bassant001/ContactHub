<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>ContactHub - Smart Contact Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------>
<!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------>
<!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------>
<!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------>
<!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------>
<!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------>
<!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------>
<!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------>

<body>
    <!-- HEADER -->
    <header class="app-header py-3">
        <div class="container d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center">
                <div class="logo-badge">
                    <i class="bi bi-person-vcard"></i>
                </div>
                <div>
                    <div class="fw-bold fs-4">
                        Contact<span class="text-primary">Hub</span>
                    </div>
                    <div class="text-muted small">Smart Contact Manager</div>
                </div>
            </div>

            <div class="d-flex align-items-center gap-3">

                <!-- Actions -->
                <div class="d-flex align-items-center gap-2">
                    <button id="btnAddcontact" class="btn btn-primary" data-bs-toggle="modal"
                        data-bs-target="#addContactModal">
                        <i class="fa-solid fa-plus me-2"></i>
                        <span class="d-none d-sm-inline">Add Contact</span>
                        <span class="d-sm-none">Add</span>
                    </button>

                    <button class="btn btn-icon d-none d-sm-flex">
                        <i class="fa-solid fa-bell"></i>
                    </button>
                    <button class="btn btn-icon d-none d-sm-flex">
                        <i class="fa-solid fa-gear"></i>
                    </button>
                    <!-- Profile -->
                    <div class="rounded-2 overflow-hidden border border-2 border-white shadow-sm"
                        style="width:50px;height:50px;">
                        <img src="image/1.jpg" alt="user avatar" class="w-100 h-100 object-fit-cover" />
                    </div>

                </div>

            </div>
        </div>
    </header>
    <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------>
    <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------>
    <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------>
    <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------>
    <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------>
    <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------>
    <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------>
    <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------>
    <!-- MAIN CONTENT -->
    <main class="container py-4">
        <!-- TOP STATS -->
        <div class="row g-3">
            <div class="col-md-4">
                <div class="card top-stat-card p-3 d-flex flex-row align-items-center">
                    <div class="top-stat-icon total me-3">
                        <i class="bi bi-people"></i>
                    </div>
                    <div>
                        <div class="text-muted text-uppercase small fw-semibold">Total</div>
                        <div class="fs-4 fw-bold" id="totalCount">0</div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card top-stat-card p-3 d-flex flex-row align-items-center">
                    <div class="top-stat-icon fav me-3">
                        <i class="bi bi-star"></i>
                    </div>
                    <div>
                        <div class="text-muted text-uppercase small fw-semibold">Favorites</div>
                        <div class="fs-4 fw-bold" id="favoritesCount">0</div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card top-stat-card p-3 d-flex flex-row align-items-center">
                    <div class="top-stat-icon emergency me-3">
                        <i class="bi bi-heart-pulse"></i>
                    </div>
                    <div>
                        <div class="text-muted text-uppercase small fw-semibold">Emergency</div>
                        <div class="fs-4 fw-bold" id="EmergencyCount">0</div>
                    </div>
                </div>
            </div>
        </div>
        <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------>
        <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------>
        <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------>
        <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------>
        <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------>
        <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------>
        <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------>
        <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------>
        <!-- BODY -->
        <div class="row mt-4">
            <!--  LEFT All Contacts -->
            <div class="col-lg-8">
                <div class="d-flex align-items-center justify-content-between mb-3">
                    <div>
                        <h3 class="fw-bold mb-1">All Contacts</h3>
                        <p class="text-muted small mb-0">
                            Manage and organize your <strong id="manageCounts">0</strong> contacts
                        </p>
                    </div>
                </div>
                <div class="search-wrapper mb-4">
                    <i class="bi bi-search"></i>
                    <input type="text" class="form-control" placeholder="Search by name, phone, or email..." id="searchinput" oninput="searchdata()" />
                </div>
                <!--Main Contact Card -->
                <div class="card contact-card mb-3" id="contactsContainer">
                    <!-- js -->
                </div>

            </div>
            <!-- RIGHT Favorites & Emergency -->
            <div class="col-lg-4 side-columns">
                <!-- Favorites -->
                <div class="card side-section-card mb-3">
                    <div class="d-flex align-items-center mb-2">
                        <div class="me-2 d-flex align-items-center justify-content-center rounded-3"
                            style="width:34px;height:34px;background:#f97316;">
                            <i class="bi bi-star-fill text-white"></i>
                        </div>
                        <div>
                            <div class="fw-semibold">Favorites</div>
                            <div class="small text-muted">Quick access to starred contacts</div>
                        </div>
                    </div>


                    <div class="card mini-contact-card mt-2" id="favoritesSection">
                        <!-- JS -->
                    </div>
                </div>
                <!--==============================================================================================================================================================================-->
                <!--==============================================================================================================================================================================-->
                <!--==============================================================================================================================================================================-->
                <!--==============================================================================================================================================================================-->
                <!-- Emergency -->
                <div class="card side-section-card emergency">
                    <div class="d-flex align-items-center mb-2">
                        <div class="me-2 d-flex align-items-center justify-content-center rounded-3"
                            style="width:34px;height:34px;background:#ef4444;">
                            <i class="bi bi-heart-pulse-fill text-white"></i>
                        </div>
                        <div>
                            <div class="fw-semibold">Emergency</div>
                            <div class="small text-muted">Important contacts for urgent calls</div>
                        </div>
                    </div>
                    <div class="card mini-contact-card mt-2"  id="emergencySection">
                        <!-- JS -->
                    </div>
                </div>
            </div>
    </main>
    <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------>
    <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------>
    <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------>
    <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------>
    <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------>
    <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------>
    <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------>
    <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------>
    <!-- ADD CONTACT -->
    <div class="modal fade" id="addContactModal" tabindex="-1" aria-labelledby="addContactLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="addContactLabel">
                        Add New Contact
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body">
                    <form>
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" placeholder="Enter full name" id="name" />
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Phone Number <span class="text-danger">*</span></label>
                            <input type="tel" class="form-control" placeholder="e.g., 01012345678" id="phone" />
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" placeholder="name@example.com" id="email" />
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Address</label>
                            <input type="text" class="form-control" placeholder="Enter address" id="address" />
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Group</label>
                            <select class="form-select" id="group">
                                <option selected disabled>Select a group</option>
                                <option>Family</option>
                                <option>Friends</option>
                                <option>Work</option>
                                <option>Others</option>
                            </select>

                        </div>

                        <div class="mb-3">
                            <label class="form-label">Notes</label>
                            <textarea rows="3" class="form-control" placeholder="Add notes about this contact"
                                id="notes"></textarea>
                        </div>

                        <div class="chips-row mt-2">
                            <label>
                                <input type="checkbox" id="fav" />
                                <span> <i class="fa-solid fa-star text-warning me-1"></i>Favorite</span>
                            </label>

                            <label>
                                <input type="checkbox" id="emergency" />
                                <span><i class="fa-solid fa-heart-pulse text-danger me-1"></i> Emergency</span>
                            </label>
                        </div>
                    </form>
                </div>

                <div class="modal-footer d-flex justify-content-between">
                    <button type="button" class="btn btn-outline-light-gray px-4" data-bs-dismiss="modal">
                        Cancel
                    </button>

                    <button type="button" class="btn btn-gradient rounded-pill px-4" id="btnAdd">
                        <i class="bi bi-check2 me-1"></i> Save Contact
                    </button>

                     <button type="button" class="btn  rounded-pill px-4 d-none bg-warning " id="btnSAVEDIT">
                        <i class="bi bi-check2 me-1"></i> Edit Contact
                    </button>

                </div>
            </div>
        </div>
    </div>
    <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------>
    <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------>
    <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------>
    <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------>
    <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------>
    <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------>
    <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------>
    <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------>
    <!-- Bootstrap 5 JS -->
    <script src="js/bootstrap.bundle.js"></script>
    <!-- Custom JS -->
    <script src="js/index.js"></script>
</body>

</html>
